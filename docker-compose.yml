services:
  forticlient-vpn:
    build: .
    container_name: forti-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
      - /dev/ppp
    env_file: .env
    networks:
      - abys_net

networks:
  # Shared network created elsewhere (e.g. the API stack):
  #   docker network create abys_net
  abys_net:
    external: true
    name: abys_net
