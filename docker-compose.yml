services:
  forticlient-vpn:
    build: .
    container_name: forti-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      # Enable IPv4 forwarding at container start so the gateway NAT works
      # without writing to a read-only /proc/sys at runtime.
      - net.ipv4.ip_forward=1
    env_file: .env
    networks:
      abys_net:
        ipv4_address: 172.21.0.10   # IP fixo, estável

networks:
  # Shared network created elsewhere with a defined subnet, e.g.:
  #   docker network create --subnet 172.21.0.0/16 abys_net
  abys_net:
    external: true
    name: abys_net
